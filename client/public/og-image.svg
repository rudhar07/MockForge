<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070d"/>
      <stop offset="0.6" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#070b14"/>
    </linearGradient>
    <radialGradient id="glow1" cx="24%" cy="28%" r="42%">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="82%" cy="78%" r="44%">
      <stop offset="0" stop-color="#e8702a" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#e8702a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="60%" cy="50%" r="40%">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background + aurora glows -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#glow3)"/>

  <!-- Subtle border frame -->
  <rect x="20" y="20" width="1160" height="590" rx="28" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Logo row -->
  <g transform="translate(90, 78)">
    <rect width="64" height="64" rx="16" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <text x="32" y="43" font-family="'Courier New', monospace" font-size="28" font-weight="700" fill="#3b82f6" text-anchor="middle">&lt;/&gt;</text>
    <text x="84" y="44" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="-1">MockForge</text>
  </g>

  <!-- Headline -->
  <text x="90" y="298" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="80" fill="#ffffff" letter-spacing="-2">Forge the skills</text>
  <text x="90" y="392" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="800" fill="#ffffff" letter-spacing="-3">interviews demand</text>

  <!-- Subtitle -->
  <text x="92" y="452" font-family="Arial, Helvetica, sans-serif" font-size="27" fill="#94a3b8">Real coding rounds · sandboxed grading · AI feedback · live leaderboard</text>

  <!-- Accent pill -->
  <g transform="translate(90, 502)">
    <rect width="286" height="50" rx="25" fill="#e8702a"/>
    <text x="143" y="33" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">Interview Simulator</text>
  </g>

  <!-- URL -->
  <text x="1110" y="556" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#64748b" text-anchor="end">mockforge-h8jw.onrender.com</text>
</svg>
